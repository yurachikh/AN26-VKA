name: Daily fleet check (Vulkan Air)

on:
  schedule:
    # 04:00 UTC каждый день (≈06:00 по Будапешту). К этому моменту UTC-сутки
    # закрыты, данные за вчера на зеркалах есть. Ранний запуск учитывает
    # возможные задержки GitHub Actions раннеров (до 30–60 мин).
    - cron: "0 4 * * *"
  workflow_dispatch: {}  # ручной запуск из вкладки Actions

permissions:
  contents: write  # нужно, чтобы коммитить обновлённый fleet.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install airportsdata gspread google-auth

      - name: Запуск суточной сводки
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python check_fleet.py | tee report.txt

      - name: Сохранить отчёт как артефакт билда
        uses: actions/upload-artifact@v4
        with:
          name: fleet-report-${{ github.run_id }}
          path: report.txt
          retention-days: 90

      - name: Закоммитить latest_report.txt и fleet.json (если изменились)
        run: |
          cp report.txt latest_report.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest_report.txt fleet.json
          [ -f routes_cache.json ] && git add routes_cache.json
          if ! git diff --cached --quiet; then
            git commit -m "Обновление отчёта: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Изменений нет, пропускаю коммит."
          fi

      - name: Отправить в Telegram (опционально)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram-секреты не настроены, пропускаю отправку."
            exit 0
          fi
          # Ссылка ведёт прямо на страницу этого workflow в Actions, где есть
          # кнопка "Run workflow" — нажатие в Telegram открывает GitHub,
          # дальше два тапа и придёт свежий отчёт.
          WORKFLOW_URL="https://github.com/${GITHUB_REPOSITORY}/actions/workflows/daily.yml"
          KEYBOARD=$(cat <<EOF
          {"inline_keyboard":[[{"text":"🔄 Обновить сейчас","url":"${WORKFLOW_URL}"}]]}
          EOF
          )
          # Длинные сообщения Telegram режет на 4096 символов — для парка из
          # 11 бортов такое влезает с большим запасом.
          curl -sS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=$(cat report.txt)" \
            --data-urlencode "reply_markup=${KEYBOARD}" > /dev/null
          echo "Отправлено в Telegram."
